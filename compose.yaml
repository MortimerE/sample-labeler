services:
  analyzer:
    # essentia-tensorflow 2.1b6.dev1389 has no Linux aarch64 wheel. Keep the
    # analyzer on amd64 until upstream publishes one; source-building TF is out
    # of scope. Cross-architecture runs use Docker's emulation on ARM hosts.
    build:
      context: .
      platforms:
        - linux/amd64
    image: inbloom-sample-labeler:latest
    platform: linux/amd64
    entrypoint: ["sleep", "infinity"]
    init: true
    volumes:
      - ./inputs:/inputs:ro
      - ./results:/results
